acknowledgements: "The author gratefully acknowledges the following data providers and platforms. MODIS vegetation index products (MOD13Q1 v061, MYD13Q1 v061) were obtained from the NASA Land Processes Distributed Active Archive Center (LP DAAC) and accessed via Google Earth Engine. ERA5-Land hourly climate reanalysis data were provided by the European Centre for Medium-Range Weather Forecasts (ECMWF) through the Copernicus Climate Data Store (CDS) and processed on Google Earth Engine. FLUXNET eddy covariance data were provided by the FLUXNET community through the FLUXNET2015 dataset. Google Earth Engine (Gorelick et al., 2017, Remote Sensing of Environment) provided the cloud computing platform for satellite data export and preprocessing. OpenAI Codex assisted with code development, pipeline automation, and manuscript preparation. The author is solely responsible for all scientific content, analysis decisions, and any errors."
